<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inscrição em Curso</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>
        <h1>Tech Academy</h1>

        <p>
            Inscreva-se em cursos de tecnologia e aprenda novas
            ferramentas para o mercado digital.
        </p>
    </header>


    <main>

        <form class="formulario">

            <label for="nome">Nome:</label>
            <input class="campo-texto" type="text" id="nome" name="nome">


            <label for="email">E-mail:</label>
            <input class="campo-texto" type="email" id="email" name="email">


            <label for="senha">Senha:</label>
            <input class="campo-texto" type="password" id="senha" name="senha">


            <label for="data">Data de nascimento:</label>
            <input class="campo-texto" type="date" id="data" name="data">


            <label for="curso">Escolha o curso:</label>

            <select class="campo-texto" id="curso">

                <option>Informática</option>
                <option>Administração</option>
                <option>Design</option>

            </select>


            <label>Turno:</label>

            <div class="opcoes">

                <input type="radio" name="turno">
                Manhã

                <input type="radio" name="turno">
                Tarde

            </div>


            <label for="comentario">
                Comentário:
            </label>

            <textarea id="comentario"></textarea>


            <div class="termos">

                <input type="checkbox">
                Aceito os termos de uso

            </div>


            <button class="botao-principal">
                Enviar inscrição
            </button>


        </form>

    </main>


    <footer class="rodape">

        <p>
            Integrantes: Daniel Moura Lopes e Ronald Gabriel da Silva Santos
        </p>

        <p>
            Data: 12/06/2026
        </p>

        <p>
            Disciplina: Programação Web
        </p>

    </footer>


</body>

</html>
